
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  #gs{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:520px;width:100%;font-family:'Share Tech Mono',monospace;padding:12px 0}
  #hud{display:flex;justify-content:space-between;align-items:center;width:480px;padding:6px 0 8px;font-family:'Orbitron',monospace;font-size:12px;color:#0ff;letter-spacing:1px}
  .hud-val{font-size:16px;font-weight:700;color:#fff}
  canvas{display:block;border:1px solid #0ff;box-shadow:0 0 18px #0ff4,0 0 40px #0003;cursor:none}
  #overlay{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;pointer-events:none}
  #overlay.hidden{display:none}
  .ov-title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#0ff;text-shadow:0 0 20px #0ff;letter-spacing:3px;text-align:center}
  .ov-sub{font-family:'Share Tech Mono',monospace;font-size:13px;color:#aef;text-align:center;line-height:1.8}
  #startBtn{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;background:transparent;border:1.5px solid #0ff;color:#0ff;padding:10px 28px;cursor:pointer;letter-spacing:2px;pointer-events:all;transition:all .2s}
  #startBtn:hover{background:#0ff1;box-shadow:0 0 12px #0ff6}
  #livesRow{display:flex;gap:6px;align-items:center}
  .wrap{position:relative;display:flex;flex-direction:column;align-items:center}
</style>
<h2 class="sr-only" style="position:absolute;left:-9999px">Space shooter arcade game</h2>
<div id="gs">
  <div id="hud">
    <div><div style="color:#0ff8;font-size:10px">SCORE</div><div class="hud-val" id="scoreEl">0</div></div>
    <div style="text-align:center"><div style="color:#0ff8;font-size:10px">WAVE</div><div class="hud-val" id="waveEl">1</div></div>
    <div style="text-align:right"><div style="color:#0ff8;font-size:10px">LIVES</div><div class="hud-val" id="livesEl">♥ ♥ ♥ ♥ ♥</div></div>
  </div>
  <div class="wrap">
    <canvas id="c" width="480" height="420"></canvas>
    <div id="overlay">
      <div class="ov-title" id="ovTitle">VOID STRIKE</div>
      <div class="ov-sub" id="ovSub">Arrow keys / WASD to move<br>Space to fire · P to pause</div>
      <button id="startBtn">LAUNCH MISSION</button>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const scoreEl=document.getElementById('scoreEl');
const waveEl=document.getElementById('waveEl');
const livesEl=document.getElementById('livesEl');
const overlay=document.getElementById('overlay');
const ovTitle=document.getElementById('ovTitle');
const ovSub=document.getElementById('ovSub');
const startBtn=document.getElementById('startBtn');

let player,bullets,enemies,particles,score,lives,wave,running,paused,raf,spawnTimer,mouseX;
let stars=[];
const keys={};

function initStars(){stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+.3,sp:Math.random()*.4+.1,b:Math.random()})}

function init(){
  player={x:W/2-18,y:H-52,w:36,h:28,speed:4.5,invincible:0,thruster:0};
  bullets=[];enemies=[];particles=[];
  score=0;lives=5;wave=1;running=true;paused=false;spawnTimer=0;mouseX=null;
  updateHUD();
  overlay.classList.add('hidden');
  spawnWave();
  if(raf)cancelAnimationFrame(raf);
  loop();
}

function updateHUD(){
  scoreEl.textContent=score;
  waveEl.textContent=wave;
  livesEl.textContent='♥ '.repeat(lives).trim()||'—';
}

function spawnWave(){
  const cols=7+Math.min(wave-1,4);
  const rows=2+Math.min(wave-1,3);
  const ew=32,eh=22,hgap=8,vgap=10;
  const totalW=cols*(ew+hgap)-hgap;
  const startX=(W-totalW)/2;
  const speed=.5+wave*.18;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      enemies.push({
        x:startX+c*(ew+hgap),y:20+r*(eh+vgap),
        w:ew,h:eh,
        speed,dir:1,
        type:r===0?'elite':r<2?'mid':'basic',
        hp:r===0?3:r<2?2:1,
        shootCd:Math.random()*200+100,
        anim:Math.random()*Math.PI*2
      });
    }
  }
}

function spawnParticles(x,y,color,n=10){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,maxLife:Math.random()*25+15,color,r:Math.random()*2+1});
  }
}

function drawPlayer(){
  const p=player;
  const cx=p.x+p.w/2;
  ctx.save();
  if(p.invincible>0&&Math.floor(p.invincible/5)%2===0){ctx.globalAlpha=.3;}
  // thruster
  ctx.fillStyle='#f80';
  ctx.globalAlpha*=.7+Math.random()*.3;
  ctx.beginPath();
  ctx.moveTo(cx-7,p.y+p.h);
  ctx.lineTo(cx+7,p.y+p.h);
  ctx.lineTo(cx,p.y+p.h+8+Math.random()*8);
  ctx.closePath();ctx.fill();
  ctx.globalAlpha=p.invincible>0&&Math.floor(p.invincible/5)%2===0?.3:1;
  // body
  ctx.fillStyle='#0cf';
  ctx.beginPath();
  ctx.moveTo(cx,p.y);
  ctx.lineTo(cx-4,p.y+10);
  ctx.lineTo(cx-p.w/2,p.y+p.h-4);
  ctx.lineTo(cx-p.w/2+4,p.y+p.h);
  ctx.lineTo(cx+p.w/2-4,p.y+p.h);
  ctx.lineTo(cx+p.w/2,p.y+p.h-4);
  ctx.lineTo(cx+4,p.y+10);
  ctx.closePath();ctx.fill();
  // cockpit
  ctx.fillStyle='#003';
  ctx.beginPath();ctx.ellipse(cx,p.y+14,5,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0ff';
  ctx.beginPath();ctx.ellipse(cx,p.y+14,3,5,0,0,Math.PI*2);ctx.fill();
  // wings
  ctx.fillStyle='#09a';
  ctx.beginPath();
  ctx.moveTo(cx-14,p.y+16);ctx.lineTo(cx-p.w/2-6,p.y+p.h);
  ctx.lineTo(cx-p.w/2,p.y+p.h);ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx+14,p.y+16);ctx.lineTo(cx+p.w/2+6,p.y+p.h);
  ctx.lineTo(cx+p.w/2,p.y+p.h);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawEnemy(e){
  const cx=e.x+e.w/2,cy=e.y+e.h/2;
  const t=e.anim;
  ctx.save();
  if(e.type==='elite'){
    ctx.fillStyle='#f4a';
    ctx.beginPath();
    ctx.moveTo(cx,e.y);ctx.lineTo(cx+e.w/2,cy+2);
    ctx.lineTo(cx+e.w/2-6,e.y+e.h);ctx.lineTo(cx-e.w/2+6,e.y+e.h);
    ctx.lineTo(cx-e.w/2,cy+2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#f06';
    ctx.beginPath();ctx.ellipse(cx,cy,7,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff0';
    ctx.beginPath();ctx.ellipse(cx,cy,3,3,0,0,Math.PI*2);ctx.fill();
  } else if(e.type==='mid'){
    ctx.fillStyle='#a6f';
    ctx.fillRect(e.x+4,e.y,e.w-8,e.h);
    ctx.fillRect(e.x,e.y+6,e.w,e.h-12);
    ctx.fillStyle='#60f';
    ctx.beginPath();ctx.ellipse(cx,cy,6,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ddf';
    for(let i=-1;i<=1;i+=2){
      ctx.beginPath();ctx.arc(cx+i*7,cy,2,0,Math.PI*2);ctx.fill();
    }
  } else {
    ctx.fillStyle='#4f8';
    ctx.beginPath();
    ctx.moveTo(cx,e.y+2);ctx.lineTo(cx+e.w/2,e.y+e.h-4);
    ctx.lineTo(cx+e.w/2-8,e.y+e.h);ctx.lineTo(cx-e.w/2+8,e.y+e.h);
    ctx.lineTo(cx-e.w/2,e.y+e.h-4);ctx.closePath();ctx.fill();
    ctx.fillStyle='#0c4';
    ctx.fillRect(cx-3,e.y+4,6,e.h-8);
  }
  // hp pips
  if(e.hp>1){
    for(let i=0;i<e.hp;i++){
      ctx.fillStyle='#ff0';
      ctx.beginPath();ctx.arc(cx-6+i*6,e.y+e.h+5,2,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

let enemyBullets=[];
function update(){
  // stars
  stars.forEach(s=>{s.y+=s.sp;if(s.y>H)s.y=0;});

  // player movement
  const p=player;
  if(mouseX!==null){
    const target=mouseX-p.w/2;
    const dx=target-p.x;
    p.x+=dx*.12;
  } else {
    if(keys['ArrowLeft']||keys['a']||keys['A'])p.x-=p.speed;
    if(keys['ArrowRight']||keys['d']||keys['D'])p.x+=p.speed;
    if(keys['ArrowUp']||keys['w']||keys['W'])p.y-=p.speed*.7;
    if(keys['ArrowDown']||keys['s']||keys['S'])p.y+=p.speed*.7;
  }
  p.x=Math.max(0,Math.min(W-p.w,p.x));
  p.y=Math.max(H*0.4,Math.min(H-p.h-4,p.y));
  if(p.invincible>0)p.invincible--;

  // player bullets (auto-shoot on hold, or manual)
  if(keys[' ']||keys['z']||keys['Z']){
    if(!p._shootCd||p._shootCd<=0){
      bullets.push({x:p.x+p.w/2-2,y:p.y,w:4,h:12,speed:10,color:'#0ff'});
      p._shootCd=12;
    }
  }
  if(p._shootCd>0)p._shootCd--;

  // move bullets up
  for(let i=bullets.length-1;i>=0;i--){
    bullets[i].y-=bullets[i].speed;
    if(bullets[i].y+bullets[i].h<0)bullets.splice(i,1);
  }

  // enemy movement & shooting
  let hitWall=false;
  enemies.forEach(e=>{
    e.x+=e.speed*e.dir;
    e.anim+=.08;
    if(e.x+e.w>W-2||e.x<2)hitWall=true;
    e.shootCd--;
    if(e.shootCd<=0){
      const etype=e.type;
      const bspeed=etype==='elite'?4.5:etype==='mid'?3.5:2.8;
      enemyBullets.push({x:e.x+e.w/2-2,y:e.y+e.h,w:4,h:10,speed:bspeed+wave*.1,color:etype==='elite'?'#f40':etype==='mid'?'#c4f':'#4f4'});
      e.shootCd=(Math.random()*120+60)-wave*5;
    }
  });
  if(hitWall){enemies.forEach(e=>{e.dir*=-1;e.y+=10;});}

  // move enemy bullets
  for(let i=enemyBullets.length-1;i>=0;i--){
    enemyBullets[i].y+=enemyBullets[i].speed;
    if(enemyBullets[i].y>H)enemyBullets.splice(i,1);
  }

  // player bullet vs enemy collision
  outer:for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){
        bullets.splice(bi,1);
        e.hp--;
        spawnParticles(e.x+e.w/2,e.y+e.h/2,e.type==='elite'?'#f4a':e.type==='mid'?'#a6f':'#4f8',6);
        if(e.hp<=0){
          score+=e.type==='elite'?30:e.type==='mid'?20:10;
          spawnParticles(e.x+e.w/2,e.y+e.h/2,e.type==='elite'?'#f40':'#ff0',18);
          enemies.splice(ei,1);
          updateHUD();
        }
        continue outer;
      }
    }
  }

  // enemy bullet vs player collision
  if(p.invincible<=0){
    for(let bi=enemyBullets.length-1;bi>=0;bi--){
      const b=enemyBullets[bi];
      const hitbox={x:p.x+4,y:p.y+4,w:p.w-8,h:p.h-4};
      if(b.x<hitbox.x+hitbox.w&&b.x+b.w>hitbox.x&&b.y<hitbox.y+hitbox.h&&b.y+b.h>hitbox.y){
        enemyBullets.splice(bi,1);
        lives--;
        p.invincible=120;
        spawnParticles(p.x+p.w/2,p.y+p.h/2,'#0cf',20);
        updateHUD();
        if(lives<=0){gameOver();return;}
      }
    }
  }

  // enemy reaches bottom
  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].y+enemies[i].h>=H-10){gameOver();return;}
  }

  // wave cleared
  if(enemies.length===0){
    wave++;waveEl.textContent=wave;
    spawnParticles(W/2,H/2,'#ff0',30);
    spawnWave();
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=.92;pt.vy*=.92;pt.life--;
    if(pt.life<=0)particles.splice(i,1);
  }
}

function draw(){
  // background
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // stars
  stars.forEach(s=>{
    ctx.globalAlpha=.3+s.b*.7;
    ctx.fillStyle='#fff';
    ctx.fillRect(s.x,s.y,s.s,s.s);
  });
  ctx.globalAlpha=1;

  // scanline effect (subtle)
  ctx.fillStyle='rgba(0,255,255,0.015)';
  for(let y=0;y<H;y+=4)ctx.fillRect(0,y,W,2);

  // player bullets
  enemies.length&&bullets.forEach(b=>{
    ctx.shadowBlur=10;ctx.shadowColor='#0ff';
    ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.shadowBlur=0;
  });

  // enemy bullets
  enemyBullets.forEach(b=>{
    ctx.shadowBlur=8;ctx.shadowColor=b.color;
    ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.shadowBlur=0;
  });

  // enemies
  enemies.forEach(e=>drawEnemy(e));

  // player
  drawPlayer();

  // particles
  particles.forEach(pt=>{
    ctx.globalAlpha=pt.life/pt.maxLife;
    ctx.fillStyle=pt.color;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // pause indicator
  if(paused){
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0ff';ctx.font="700 22px 'Orbitron',monospace";
    ctx.textAlign='center';ctx.fillText('PAUSED',W/2,H/2-10);
    ctx.font="13px 'Share Tech Mono',monospace";ctx.fillStyle='#aef';
    ctx.fillText('press P to resume',W/2,H/2+18);ctx.textAlign='left';
  }
}

function gameOver(){
  running=false;cancelAnimationFrame(raf);
  ovTitle.textContent='GAME OVER';
  ovSub.innerHTML='Wave reached: '+wave+'<br>Final score: '+score;
  startBtn.textContent='PLAY AGAIN';
  overlay.classList.remove('hidden');
}

function loop(){
  if(!running)return;
  if(!paused)update();
  draw();
  raf=requestAnimationFrame(loop);
}

// Controls
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' ')e.preventDefault();
  if((e.key==='p'||e.key==='P')&&running)paused=!paused;
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=e.clientX-rect.left;
});
canvas.addEventListener('mouseleave',()=>{mouseX=null;});
canvas.addEventListener('click',()=>{
  if(!running||paused)return;
  const p=player;
  if(!p._shootCd||p._shootCd<=0){
    bullets.push({x:p.x+p.w/2-2,y:p.y,w:4,h:12,speed:10,color:'#0ff'});
    p._shootCd=12;
  }
});

startBtn.addEventListener('click',()=>{
  enemyBullets=[];
  initStars();
  init();
});

initStars();
// draw idle frame
ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
stars.forEach(s=>{ctx.globalAlpha=.5;ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.s,s.s);});
ctx.globalAlpha=1;
</script>
