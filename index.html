<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VOID STRIKE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Share Tech Mono',monospace}
#gs{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:12px 0}
#hud{display:flex;justify-content:space-between;align-items:center;width:480px;padding:6px 0 8px;font-family:'Orbitron',monospace;font-size:11px;color:#0ff9;letter-spacing:1px}
.hud-val{font-size:16px;font-weight:700;color:#fff;text-shadow:0 0 8px #0ff}
canvas{display:block;border:1px solid #0ff5;box-shadow:0 0 24px #0ff3,0 0 60px #0002;cursor:none}
#overlay{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none}
#overlay.hidden{display:none}
.ov-title{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:#0ff;text-shadow:0 0 30px #0ff,0 0 60px #0ff5;letter-spacing:4px;text-align:center}
.ov-sub{font-family:'Share Tech Mono',monospace;font-size:13px;color:#aef;text-align:center;line-height:2}
#startBtn{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;background:transparent;border:1.5px solid #0ff;color:#0ff;padding:10px 28px;cursor:pointer;letter-spacing:2px;pointer-events:all;transition:all .2s;text-shadow:0 0 8px #0ff}
#startBtn:hover{background:#0ff1;box-shadow:0 0 18px #0ff8;transform:scale(1.04)}
.wrap{position:relative;display:flex;flex-direction:column;align-items:center}
#credit{font-family:'Share Tech Mono',monospace;font-size:11px;color:#0ff6;text-align:center;margin-top:4px;letter-spacing:1px}
#credit a{color:#0ff;text-decoration:none}
#credit a:hover{text-shadow:0 0 8px #0ff}
</style>
</head>
<body>
<div id="gs">
  <div id="hud">
    <div><div style="color:#0ff6;font-size:9px;letter-spacing:2px">SCORE</div><div class="hud-val" id="scoreEl">0</div></div>
    <div style="text-align:center"><div style="color:#0ff6;font-size:9px;letter-spacing:2px">WAVE</div><div class="hud-val" id="waveEl">1</div></div>
    <div style="text-align:right"><div style="color:#0ff6;font-size:9px;letter-spacing:2px">LIVES</div><div class="hud-val" id="livesEl">♥ ♥ ♥ ♥ ♥</div></div>
  </div>
  <div class="wrap">
    <canvas id="c" width="480" height="420"></canvas>
    <div id="overlay">
      <div class="ov-title" id="ovTitle">VOID STRIKE</div>
      <div class="ov-sub" id="ovSub">Arrow keys / WASD to move<br>Space to fire · P to pause</div>
      <button id="startBtn">LAUNCH MISSION</button>
      <div id="ovCredit" style="display:none;font-family:'Share Tech Mono',monospace;font-size:11px;color:#0ff8;text-align:center;line-height:2">
        Made By S.Hildering<br><a href="https://littendekitten.github.io/Portfolio" target="_blank" style="color:#0ff;text-shadow:0 0 8px #0ff">littendekitten.github.io/Portfolio</a>
      </div>
    </div>
  </div>
  <div id="credit">Made By S.Hildering · <a href="https://littendekitten.github.io/Portfolio" target="_blank">littendekitten.github.io/Portfolio</a></div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d',{alpha:false});
const W=canvas.width,H=canvas.height;
const scoreEl=document.getElementById('scoreEl');
const waveEl=document.getElementById('waveEl');
const livesEl=document.getElementById('livesEl');
const overlay=document.getElementById('overlay');
const ovTitle=document.getElementById('ovTitle');
const ovSub=document.getElementById('ovSub');
const ovCredit=document.getElementById('ovCredit');
const startBtn=document.getElementById('startBtn');

// ── Offscreen star canvas for performance ──
const starCanvas=document.createElement('canvas');
starCanvas.width=W;starCanvas.height=H;
const sCtx=starCanvas.getContext('2d');

let player,bullets,enemies,enemyBullets,particles,score,lives,wave,running,paused,raf,mouseX,gameWon;
const keys={};
let stars=[],nebulaPoints=[];
let frameCount=0;

// ── Star layers (parallax) ──
function initStars(){
  stars=[];
  // Layer 0: dim distant
  for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:.5,sp:.12,b:.25+Math.random()*.3,layer:0});
  // Layer 1: mid
  for(let i=0;i<50;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:1,sp:.28,b:.4+Math.random()*.4,layer:1});
  // Layer 2: bright close
  for(let i=0;i<20;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:1.5,sp:.5,b:.7+Math.random()*.3,layer:2});
  // Nebula blobs
  nebulaPoints=[];
  for(let i=0;i<6;i++)nebulaPoints.push({x:Math.random()*W,y:Math.random()*H,r:40+Math.random()*80,c:Math.random()<.5?'#0ff':'#60f',a:.025+Math.random()*.035});
  renderStarCanvas();
}

function renderStarCanvas(){
  sCtx.fillStyle='#000';sCtx.fillRect(0,0,W,H);
  // Nebula
  nebulaPoints.forEach(n=>{
    const g=sCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.c.replace(')',`,${n.a})`).replace('rgb','rgba').replace('#0ff',`rgba(0,255,255,${n.a})`).replace('#60f',`rgba(102,0,255,${n.a})`));
    g.addColorStop(1,'transparent');
    sCtx.fillStyle=g;sCtx.fillRect(0,0,W,H);
  });
  // Static stars
  stars.forEach(s=>{
    sCtx.globalAlpha=s.b;
    sCtx.fillStyle=s.layer===2?'#cef':s.layer===1?'#adf':'#89c';
    sCtx.fillRect(s.x,s.y,s.s,s.s);
  });
  sCtx.globalAlpha=1;
}

function init(){
  player={x:W/2-18,y:H-52,w:36,h:28,speed:4.5,invincible:0,_shootCd:0};
  bullets=[];enemies=[];enemyBullets=[];particles=[];
  score=0;lives=5;wave=1;running=true;paused=false;mouseX=null;gameWon=false;
  updateHUD();
  overlay.classList.add('hidden');
  ovCredit.style.display='none';
  spawnWave();
  if(raf)cancelAnimationFrame(raf);
  frameCount=0;
  loop();
}

function updateHUD(){
  scoreEl.textContent=score;
  waveEl.textContent=wave;
  livesEl.textContent='♥ '.repeat(lives).trim()||'—';
}

function spawnWave(){
  const cols=Math.min(7+wave-1,11);
  const rows=Math.min(2+Math.floor((wave-1)/2),5);
  const ew=30,eh=20,hgap=8,vgap=10;
  const totalW=cols*(ew+hgap)-hgap;
  const startX=(W-totalW)/2;
  const speed=.45+wave*.16;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      enemies.push({
        x:startX+c*(ew+hgap),y:22+r*(eh+vgap+4),
        w:ew,h:eh,speed,dir:1,
        type:r===0?'elite':r<2?'mid':'basic',
        hp:r===0?3:r<2?2:1,
        shootCd:80+Math.random()*160,
        anim:Math.random()*Math.PI*2
      });
    }
  }
}

function spawnParticles(x,y,color,n=8){
  // Cap total particles for performance
  if(particles.length>200)return;
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=Math.random()*3+.5;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,maxLife:Math.random()*20+10,color,r:Math.random()*2+.5});
  }
}

// ── Drawing helpers ──
function drawPlayer(){
  const p=player,cx=p.x+p.w/2;
  ctx.save();
  const blink=p.invincible>0&&Math.floor(p.invincible/5)%2===0;
  if(blink)ctx.globalAlpha=.25;

  // Thruster flame
  const flkr=.7+Math.random()*.3;
  const grad=ctx.createLinearGradient(cx,p.y+p.h,cx,p.y+p.h+14*flkr);
  grad.addColorStop(0,'#fff');grad.addColorStop(.3,'#f90');grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(cx-6,p.y+p.h);ctx.lineTo(cx+6,p.y+p.h);
  ctx.lineTo(cx,p.y+p.h+14*flkr);ctx.closePath();ctx.fill();

  // Wing glow
  ctx.shadowBlur=12;ctx.shadowColor='#0cf';

  // Hull body
  const hullGrad=ctx.createLinearGradient(p.x,p.y,p.x+p.w,p.y+p.h);
  hullGrad.addColorStop(0,'#0ef');hullGrad.addColorStop(.5,'#0af');hullGrad.addColorStop(1,'#07c');
  ctx.fillStyle=hullGrad;
  ctx.beginPath();
  ctx.moveTo(cx,p.y);
  ctx.lineTo(cx-3,p.y+9);ctx.lineTo(cx-p.w/2,p.y+p.h-5);
  ctx.lineTo(cx-p.w/2+4,p.y+p.h);ctx.lineTo(cx+p.w/2-4,p.y+p.h);
  ctx.lineTo(cx+p.w/2,p.y+p.h-5);ctx.lineTo(cx+3,p.y+9);ctx.closePath();ctx.fill();

  // Wing fins
  ctx.fillStyle='#08b';
  ctx.beginPath();ctx.moveTo(cx-12,p.y+14);ctx.lineTo(cx-p.w/2-8,p.y+p.h);ctx.lineTo(cx-p.w/2,p.y+p.h);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+12,p.y+14);ctx.lineTo(cx+p.w/2+8,p.y+p.h);ctx.lineTo(cx+p.w/2,p.y+p.h);ctx.closePath();ctx.fill();

  // Cockpit
  ctx.shadowBlur=0;
  ctx.fillStyle='#001a33';
  ctx.beginPath();ctx.ellipse(cx,p.y+13,5,7,0,0,Math.PI*2);ctx.fill();
  const cpGrad=ctx.createRadialGradient(cx-1,p.y+11,0,cx,p.y+13,5);
  cpGrad.addColorStop(0,'#7ff');cpGrad.addColorStop(1,'#09f6');
  ctx.fillStyle=cpGrad;
  ctx.beginPath();ctx.ellipse(cx,p.y+13,3.5,5.5,0,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

function drawEnemy(e){
  const cx=e.x+e.w/2,cy=e.y+e.h/2;
  ctx.save();

  if(e.type==='elite'){
    // Elite: menacing pink/red saucer
    const g=ctx.createRadialGradient(cx,cy,2,cx,cy,e.w/2);
    g.addColorStop(0,'#ff6');g.addColorStop(.4,'#f06');g.addColorStop(1,'#800');
    ctx.shadowBlur=14;ctx.shadowColor='#f06';
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(cx,e.y);ctx.lineTo(cx+e.w/2,cy);
    ctx.lineTo(cx+e.w/2-5,e.y+e.h);ctx.lineTo(cx-e.w/2+5,e.y+e.h);
    ctx.lineTo(cx-e.w/2,cy);ctx.closePath();ctx.fill();
    // Pulsing core
    const pulse=.7+.3*Math.sin(e.anim*2);
    ctx.fillStyle=`rgba(255,255,0,${pulse})`;
    ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
    // Side weapons
    ctx.fillStyle='#f80';
    ctx.fillRect(e.x,cy-2,5,4);ctx.fillRect(e.x+e.w-5,cy-2,5,4);
  } else if(e.type==='mid'){
    // Mid: purple crab
    const g=ctx.createLinearGradient(e.x,e.y,e.x+e.w,e.y+e.h);
    g.addColorStop(0,'#c4f');g.addColorStop(1,'#60a');
    ctx.shadowBlur=10;ctx.shadowColor='#a4f';
    ctx.fillStyle=g;
    ctx.fillRect(e.x+4,e.y+3,e.w-8,e.h-6);
    ctx.fillRect(e.x,e.y+7,e.w,e.h-14);
    // Eyes
    ctx.shadowBlur=0;
    ctx.fillStyle='#ddf';
    ctx.beginPath();ctx.arc(cx-6,cy-1,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+6,cy-1,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#00f';
    ctx.beginPath();ctx.arc(cx-6,cy-1,1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+6,cy-1,1,0,Math.PI*2);ctx.fill();
    // Underbelly
    ctx.fillStyle='rgba(200,150,255,.4)';
    ctx.beginPath();ctx.ellipse(cx,cy+3,7,3,0,0,Math.PI*2);ctx.fill();
  } else {
    // Basic: green drone
    const g=ctx.createLinearGradient(e.x,e.y,e.x,e.y+e.h);
    g.addColorStop(0,'#5fc');g.addColorStop(1,'#090');
    ctx.shadowBlur=8;ctx.shadowColor='#0f6';
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(cx,e.y+2);ctx.lineTo(cx+e.w/2,e.y+e.h-4);
    ctx.lineTo(cx+e.w/2-7,e.y+e.h);ctx.lineTo(cx-e.w/2+7,e.y+e.h);
    ctx.lineTo(cx-e.w/2,e.y+e.h-4);ctx.closePath();ctx.fill();
    ctx.fillStyle='#0f9';
    ctx.fillRect(cx-2,e.y+4,4,e.h-10);
  }

  ctx.shadowBlur=0;

  // HP pips
  if(e.hp>1){
    for(let i=0;i<e.hp;i++){
      ctx.fillStyle=i===0?'#ff0':'#fa0';
      ctx.beginPath();ctx.arc(cx-(e.hp-1)*4+i*8,e.y+e.h+5,2,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

function update(){
  frameCount++;
  // Scroll stars
  stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});

  // Player movement
  const p=player;
  if(mouseX!==null){
    const dx=(mouseX-p.w/2)-p.x;
    p.x+=dx*.13;
  } else {
    if(keys['ArrowLeft']||keys['a']||keys['A'])p.x-=p.speed;
    if(keys['ArrowRight']||keys['d']||keys['D'])p.x+=p.speed;
    if(keys['ArrowUp']||keys['w']||keys['W'])p.y-=p.speed*.7;
    if(keys['ArrowDown']||keys['s']||keys['S'])p.y+=p.speed*.7;
  }
  p.x=Math.max(0,Math.min(W-p.w,p.x));
  p.y=Math.max(H*.38,Math.min(H-p.h-4,p.y));
  if(p.invincible>0)p.invincible--;

  // Player shooting
  if(keys[' ']||keys['z']||keys['Z']){
    if(p._shootCd<=0){
      bullets.push({x:p.x+p.w/2-2,y:p.y,w:4,h:14,speed:11});
      p._shootCd=11;
    }
  }
  if(p._shootCd>0)p._shootCd--;

  // Move player bullets
  for(let i=bullets.length-1;i>=0;i--){
    bullets[i].y-=bullets[i].speed;
    if(bullets[i].y<0)bullets.splice(i,1);
  }

  // Enemy movement & shooting
  let hitWall=false;
  const waveShootMin=Math.max(40,90-wave*4);
  enemies.forEach(e=>{
    e.x+=e.speed*e.dir;
    e.anim+=.07;
    if(e.x+e.w>W-2||e.x<2)hitWall=true;
    if(--e.shootCd<=0){
      const bspd=e.type==='elite'?4.5:e.type==='mid'?3.5:2.8;
      enemyBullets.push({x:e.x+e.w/2-2,y:e.y+e.h,w:4,h:10,speed:bspd+wave*.08,color:e.type==='elite'?'#f40':e.type==='mid'?'#c4f':'#4f4'});
      e.shootCd=waveShootMin+Math.random()*100;
    }
  });
  if(hitWall)enemies.forEach(e=>{e.dir*=-1;e.y+=8;});

  // Move enemy bullets
  for(let i=enemyBullets.length-1;i>=0;i--){
    enemyBullets[i].y+=enemyBullets[i].speed;
    if(enemyBullets[i].y>H)enemyBullets.splice(i,1);
  }

  // Player bullet vs enemy
  outer:for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){
        bullets.splice(bi,1);
        e.hp--;
        spawnParticles(e.x+e.w/2,e.y+e.h/2,e.type==='elite'?'#f4a':e.type==='mid'?'#c8f':'#4f8',5);
        if(e.hp<=0){
          score+=e.type==='elite'?30:e.type==='mid'?20:10;
          spawnParticles(e.x+e.w/2,e.y+e.h/2,e.type==='elite'?'#f40':'#ff0',14);
          enemies.splice(ei,1);
          updateHUD();
        }
        continue outer;
      }
    }
  }

  // Enemy bullet vs player
  if(p.invincible<=0){
    for(let bi=enemyBullets.length-1;bi>=0;bi--){
      const b=enemyBullets[bi];
      const hx=p.x+4,hy=p.y+4,hw=p.w-8,hh=p.h-4;
      if(b.x<hx+hw&&b.x+b.w>hx&&b.y<hy+hh&&b.y+b.h>hy){
        enemyBullets.splice(bi,1);
        lives--;p.invincible=100;
        spawnParticles(p.x+p.w/2,p.y+p.h/2,'#0cf',16);
        updateHUD();
        if(lives<=0){gameOver();return;}
      }
    }
  }

  // Enemy reaches bottom
  for(const e of enemies)if(e.y+e.h>=H-8){gameOver();return;}

  // Wave cleared
  if(enemies.length===0){
    wave++;
    updateHUD();
    spawnParticles(W/2,H/2,'#ff0',20);
    // Check win condition (wave 10 cleared = you win)
    if(wave>10){winGame();return;}
    spawnWave();
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=.91;pt.vy*=.91;pt.life--;
    if(pt.life<=0)particles.splice(i,1);
  }
}

function draw(){
  // Draw star bg from offscreen canvas
  ctx.drawImage(starCanvas,0,0);

  // Animated star layer (moving stars drawn on top)
  ctx.save();
  stars.forEach(s=>{
    ctx.globalAlpha=s.b;
    // Twinkle on layer 2
    if(s.layer===2)ctx.globalAlpha=s.b*(.7+.3*Math.sin(frameCount*.08+s.x));
    ctx.fillStyle=s.layer===2?'#fff':s.layer===1?'#cef':'#9ab';
    ctx.fillRect(s.x,s.y,s.s,s.s);
  });
  ctx.restore();

  // Player bullets
  if(bullets.length){
    ctx.shadowBlur=16;ctx.shadowColor='#0ff';
    bullets.forEach(b=>{
      const g=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
      g.addColorStop(0,'#fff');g.addColorStop(1,'#0cf');
      ctx.fillStyle=g;ctx.fillRect(b.x,b.y,b.w,b.h);
    });
    ctx.shadowBlur=0;
  }

  // Enemy bullets (batch by color to reduce shadow resets)
  if(enemyBullets.length){
    ['#f40','#c4f','#4f4'].forEach(col=>{
      const batch=enemyBullets.filter(b=>b.color===col);
      if(!batch.length)return;
      ctx.shadowBlur=10;ctx.shadowColor=col;ctx.fillStyle=col;
      batch.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));
    });
    ctx.shadowBlur=0;
  }

  // Enemies
  enemies.forEach(e=>drawEnemy(e));

  // Player
  drawPlayer();

  // Particles (batched by color)
  if(particles.length){
    const colorMap={};
    particles.forEach(pt=>{
      if(!colorMap[pt.color])colorMap[pt.color]=[];
      colorMap[pt.color].push(pt);
    });
    Object.entries(colorMap).forEach(([col,pts])=>{
      ctx.fillStyle=col;
      pts.forEach(pt=>{
        ctx.globalAlpha=pt.life/pt.maxLife;
        ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();
      });
    });
    ctx.globalAlpha=1;
  }

  // Pause overlay
  if(paused){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0ff';ctx.font="700 22px 'Orbitron',monospace";
    ctx.textAlign='center';ctx.fillText('PAUSED',W/2,H/2-12);
    ctx.font="13px 'Share Tech Mono',monospace";ctx.fillStyle='#aef';
    ctx.fillText('press P to resume',W/2,H/2+16);ctx.textAlign='left';
  }
}

function gameOver(){
  running=false;cancelAnimationFrame(raf);
  ovTitle.textContent='GAME OVER';
  ovSub.innerHTML='Wave reached: <b>'+wave+'</b><br>Final score: <b>'+score+'</b>';
  ovCredit.style.display='none';
  startBtn.textContent='PLAY AGAIN';
  overlay.classList.remove('hidden');
}

function winGame(){
  running=false;cancelAnimationFrame(raf);
  // Victory draw
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
  ovTitle.textContent='YOU WIN!';
  ovTitle.style.color='#ff0';ovTitle.style.textShadow='0 0 30px #ff0,0 0 60px #ff06';
  ovSub.innerHTML='All waves cleared!<br>Final score: <b>'+score+'</b>';
  ovCredit.style.display='block';
  startBtn.textContent='PLAY AGAIN';
  overlay.classList.remove('hidden');
  // Reset title color after
  setTimeout(()=>{ovTitle.style.color='';ovTitle.style.textShadow='';},100);
}

function loop(){
  if(!running)return;
  if(!paused)update();
  draw();
  raf=requestAnimationFrame(loop);
}

// ── Controls ──
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' ')e.preventDefault();
  if((e.key==='p'||e.key==='P')&&running)paused=!paused;
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=e.clientX-rect.left;
});
canvas.addEventListener('mouseleave',()=>{mouseX=null;});
canvas.addEventListener('click',()=>{
  if(!running||paused)return;
  if(player._shootCd<=0){
    bullets.push({x:player.x+player.w/2-2,y:player.y,w:4,h:14,speed:11});
    player._shootCd=11;
  }
});

startBtn.addEventListener('click',()=>{
  ovTitle.textContent='VOID STRIKE';
  enemyBullets=[];
  initStars();
  init();
});

// ── Init idle screen ──
initStars();
ctx.drawImage(starCanvas,0,0);
</script>
</body>
</html>
